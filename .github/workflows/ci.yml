name: CI

on:
  push:
  pull_request:

jobs:
  validate-repository:
    name: Validate Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Repository validation
        run: |
          set -eu
          test -f README.md
          test -f AGENTS.md
          test -f CODEX_TASK.md
          test -f master-spec/dztech-sdd-master-spec-v1.md
          test -f master-spec/dztech-sdd-master-operational-workflow-spec-v1.md
          test -d ideation
          test -d master-spec
          test -d project-registry
          test -d templates
          test -d framework
          test -d tasks
          test -d .github/workflows
          test -f ideation/README.md
          test -f master-spec/README.md
          test -f project-registry/README.md
          test -f project-registry/project-record-template.md
          test -f templates/README.md
          test -f templates/spec-template.md
          test -f templates/project-record-template.md
          test -f framework/README.md
          test -f framework/manifest.md
          test -f framework/principles.md
          test -f framework/ideation-to-spec-method.md
          test -f framework/spec-canon.md
          test -f framework/workflow-state-model.md
          test -f framework/validation-gates.md
          test -f framework/agent-execution-rules.md
          test -f framework/traceability.md
          test -f framework/version.md
          test -f tasks/bootstrap-repo.md
          test -f tasks/create-project-from-spec.md
          test -f tasks/reconcile-repo.md
          test -f tasks/validate-repo.md
          grep -q '^The canonical version source is `framework/manifest.md`\\.$' framework/version.md
          grep -q '^Do not duplicate version values in this file\\.$' framework/version.md
          grep -q '^## Task System$' CODEX_TASK.md
          grep -q '^## Final Step$' CODEX_TASK.md
          ! grep -q '^## Execution Model$' CODEX_TASK.md
          echo "Repository structure validation passed"
